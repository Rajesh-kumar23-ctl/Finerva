<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finerva | Portfolio Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; }

        :root {
            --primary: #00f5d4;
            --secondary: #7b2cbf;
            --accent: #ff6b6b;
            --gold: #ffd93d;
            --dark: #0a0a0f;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            background: var(--dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 245, 212, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(123, 44, 191, 0.06) 0%, transparent 50%);
            animation: bgMove 20s ease-in-out infinite;
        }

        @keyframes bgMove {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(1%, 1%); }
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 16px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            gap: 24px;
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .nav-links a.active {
            color: var(--primary);
        }

        .main-content {
            flex: 1;
            padding: 100px 5% 40px;
            position: relative;
            z-index: 10;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        .page-header {
            margin-bottom: 30px;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .page-subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.95rem;
        }

        .glass-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 24px;
            backdrop-filter: blur(20px);
        }

        .summary-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .summary-item {
            text-align: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        .summary-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .summary-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: #ffffff;
        }

        .summary-value.positive { color: var(--success); }
        .summary-value.negative { color: var(--error); }

        .input-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .input-group input {
            padding: 14px 16px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 0.95rem;
            font-weight: 500;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 245, 212, 0.15);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .add-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 12px;
            color: var(--dark);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 245, 212, 0.25);
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 16px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
            border-bottom: 1px solid var(--glass-border);
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--glass-border);
        }

        .symbol-cell {
            font-weight: 600;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .profit {
            color: var(--success);
            font-weight: 600;
        }

        .loss {
            color: var(--error);
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            
            .summary-bar {
                grid-template-columns: 1fr;
            }
            
            .input-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="bg-animation"></div>

    <nav>
        <div class="logo">Finerva</div>
        <div class="nav-links">
            <a href="learningmodule.html">Dashboard</a>
            <a href="STOCKPREDICTOR.html">Stock Predictor</a>
            <a href="portfolio analyser.html" class="active">Portfolio</a>
            <a href="newsintellligence.html">News</a>
            <a href="ai advisor.html">AI Advisor</a>
        </div>
    </nav>

    <div class="main-content">
        <div class="page-header">
            <h1 class="page-title">💼 Portfolio Analyzer</h1>
            <p class="page-subtitle">Track and manage your investment portfolio</p>
        </div>

        <div class="glass-card">
            <div class="summary-bar">
                <div class="summary-item">
                    <div class="summary-label">Total Invested</div>
                    <div class="summary-value" id="totalInvested">$0</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">Current Value</div>
                    <div class="summary-value" id="currentValue">$0</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">Total P/L</div>
                    <div class="summary-value" id="totalPL">0%</div>
                </div>
            </div>

            <div class="input-section">
                <div class="input-group">
                    <label>Symbol</label>
                    <input type="text" id="symbol" placeholder="AAPL">
                </div>
                <div class="input-group">
                    <label>Quantity</label>
                    <input type="number" id="qty" placeholder="10">
                </div>
                <div class="input-group">
                    <label>Buy Price</label>
                    <input type="number" id="price" placeholder="150.00">
                </div>
            </div>
            <button class="add-btn" onclick="addAsset()">+ Add Asset</button>
        </div>

        <div class="glass-card">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Symbol</th>
                            <th>Quantity</th>
                            <th>Buy Price</th>
                            <th>Current Price</th>
                            <th>P/L</th>
                        </tr>
                    </thead>
                    <tbody id="portfolioBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let portfolio = [];

        function addAsset() {
            const symbol = document.getElementById('symbol').value.trim().toUpperCase();
            const qty = parseFloat(document.getElementById('qty').value);
            const buyPrice = parseFloat(document.getElementById('price').value);

            if (!symbol || isNaN(qty) || isNaN(buyPrice)) {
                alert('Please fill in all fields');
                return;
            }

            const currentPrice = buyPrice * (0.9 + Math.random() * 0.25);
            const plPercent = ((currentPrice - buyPrice) / buyPrice) * 100;

            portfolio.push({ symbol, qty, buyPrice, currentPrice, plPercent });
            updateDisplay();

            document.getElementById('symbol').value = '';
            document.getElementById('qty').value = '';
            document.getElementById('price').value = '';
        }

        function updateDisplay() {
            const tbody = document.getElementById('portfolioBody');
            tbody.innerHTML = '';

            let totalInvested = 0;
            let currentTotalVal = 0;

            portfolio.forEach(item => {
                totalInvested += (item.qty * item.buyPrice);
                currentTotalVal += (item.qty * item.currentPrice);

                const plClass = item.plPercent >= 0 ? 'profit' : 'loss';
                const plPrefix = item.plPercent >= 0 ? '+' : '';

                tbody.innerHTML += `
                    <tr>
                        <td class="symbol-cell">${item.symbol}</td>
                        <td>${item.qty}</td>
                        <td>$${item.buyPrice.toFixed(2)}</td>
                        <td>$${item.currentPrice.toFixed(2)}</td>
                        <td class="${plClass}">${plPrefix}${item.plPercent.toFixed(2)}%</td>
                    </tr>
                `;
            });

            document.getElementById('totalInvested').textContent = '$' + totalInvested.toLocaleString();
            document.getElementById('currentValue').textContent = '$' + currentTotalVal.toLocaleString();

            const totalPL = totalInvested > 0 ? ((currentTotalVal - totalInvested) / totalInvested) * 100 : 0;
            const plEl = document.getElementById('totalPL');
            plEl.textContent = (totalPL >= 0 ? '+' : '') + totalPL.toFixed(2) + '%';
            plEl.className = 'summary-value ' + (totalPL >= 0 ? 'positive' : 'negative');
        }
    </script>
</body>
</html>
