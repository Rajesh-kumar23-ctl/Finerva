<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finerva | Learning Module</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; }

        :root {
            --primary: #00f5d4;
            --secondary: #7b2cbf;
            --accent: #ff6b6b;
            --dark: #0a0a0f;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-white: #ffffff;
        }

        body {
            background: var(--dark);
            color: var(--text-white);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-btn {
            padding: 10px 20px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text-white);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: rgba(0, 245, 212, 0.1);
            border-color: var(--primary);
        }

        /* Main Content */
        .main-content {
            padding: 100px 5% 40px;
            max-width: 900px;
            margin: 0 auto;
        }

        /* Module Header */
        .module-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .module-number {
            display: inline-block;
            padding: 8px 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 20px;
            color: var(--dark);
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }

        .module-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--text-white), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .module-desc {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
        }

        /* Content Section */
        .content-section {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .content-text {
            font-size: 1rem;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.85);
        }

        .content-text p {
            margin-bottom: 16px;
        }

        .key-points {
            margin-top: 24px;
        }

        .key-point {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 16px;
            background: rgba(0, 245, 212, 0.05);
            border-radius: 12px;
            margin-bottom: 12px;
            border-left: 3px solid var(--primary);
        }

        .key-point-icon {
            font-size: 1.2rem;
        }

        /* Quiz Section */
        .quiz-section {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 30px;
            display: none;
        }

        .quiz-section.active {
            display: block;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .quiz-progress {
            display: flex;
            gap: 8px;
            margin-bottom: 30px;
        }

        .quiz-dot {
            width: 40px;
            height: 6px;
            background: var(--glass-border);
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        .quiz-dot.correct {
            background: #10b981;
        }

        .quiz-dot.wrong {
            background: var(--accent);
        }

        .quiz-dot.current {
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }

        .question-card {
            margin-bottom: 30px;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            padding: 16px 20px;
            background: var(--glass);
            border: 2px solid var(--glass-border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option:hover:not(.disabled) {
            border-color: var(--primary);
            background: rgba(0, 245, 212, 0.05);
        }

        .option.selected {
            border-color: var(--primary);
            background: rgba(0, 245, 212, 0.1);
        }

        .option.correct {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.2);
        }

        .option.wrong {
            border-color: var(--accent);
            background: rgba(255, 107, 107, 0.2);
        }

        .option.disabled {
            pointer-events: none;
        }

        .option-letter {
            width: 32px;
            height: 32px;
            background: var(--glass-border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            flex-shrink: 0;
        }

        .option.correct .option-letter {
            background: #10b981;
        }

        .option.wrong .option-letter {
            background: var(--accent);
        }

        /* Explanation */
        .explanation {
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            display: none;
        }

        .explanation.show {
            display: block;
            animation: slideUp 0.3s ease;
        }

        .explanation.correct {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .explanation.wrong {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
        }

        .explanation-title {
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .explanation.correct .explanation-title {
            color: #10b981;
        }

        .explanation.wrong .explanation-title {
            color: var(--accent);
        }

        /* Buttons */
        .btn-container {
            display: flex;
            gap: 16px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--dark);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 245, 212, 0.3);
        }

        .btn-secondary {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text-white);
        }

        .btn-secondary:hover {
            border-color: var(--primary);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Results */
        .results-section {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .results-section.active {
            display: block;
            animation: slideUp 0.5s ease;
        }

        .results-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .results-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .results-score {
            font-size: 3rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 12px;
        }

        .results-message {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
        }

        /* Completion Badge */
        .completion-badge {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 30px;
            color: var(--dark);
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 245, 212, 0.3); }
            50% { box-shadow: 0 0 40px rgba(0, 245, 212, 0.6); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .module-title {
                font-size: 1.8rem;
            }
            .content-section, .quiz-section {
                padding: 24px;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="logo">Finerva</div>
        <a href="learningmodule.html" class="back-btn">← Back to Dashboard</a>
    </header>

    <!-- Main Content -->
    <div class="main-content">
        
        <!-- Module Content -->
        <div id="contentSection">
            <div class="module-header">
                <span class="module-number" id="moduleNumber">Module 1 of 20</span>
                <h1 class="module-title" id="moduleTitle">Stock Market Basics</h1>
                <p class="module-desc" id="moduleDesc">Understanding the fundamentals of financial markets and investing</p>
            </div>

            <div class="content-section">
                <h2 class="section-title">📚 Study Material</h2>
                <div class="content-text" id="studyContent">
                    <!-- Content will be inserted by JavaScript -->
                </div>

                <div class="key-points" id="keyPoints">
                    <!-- Key points will be inserted by JavaScript -->
                </div>
            </div>

            <button class="btn btn-primary" onclick="startQuiz()" style="width: 100%;">
                ✓ Mark as Read & Start Quiz
            </button>
        </div>

        <!-- Quiz Section -->
        <div class="quiz-section" id="quizSection">
            <div class="quiz-progress" id="quizProgress">
                <!-- Quiz dots will be inserted by JavaScript -->
            </div>

            <div class="question-card" id="questionCard">
                <!-- Question will be inserted by JavaScript -->
            </div>

            <div class="explanation" id="explanation">
                <!-- Explanation will be inserted by JavaScript -->
            </div>

            <div class="btn-container">
                <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()" disabled>← Previous</button>
                <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>Next →</button>
            </div>
        </div>

        <!-- Results Section -->
        <div class="results-section" id="resultsSection">
            <div class="results-icon" id="resultsIcon">🎉</div>
            <h2 class="results-title" id="resultsTitle">Module Complete!</h2>
            <div class="results-score" id="resultsScore">5/5</div>
            <p class="results-message" id="resultsMessage">Perfect score! You've mastered this module.</p>
            <div class="btn-container">
                <a href="learningmodule.html" class="btn btn-primary">Back to Dashboard</a>
                <button class="btn btn-secondary" id="retryBtn" onclick="retryQuiz()">Retry Quiz</button>
            </div>
            <div class="completion-badge" id="completionBadge">✓ Module Completed</div>
        </div>

    </div>

    <script>
        // Learning Modules Data - 20 Modules
        const modules = [
            {
                id: 1,
                title: "Stock Market Basics",
                description: "Understanding the fundamentals of financial markets and investing",
                content: `<p>The stock market is a collection of markets where stocks (pieces of ownership in businesses) are traded between investors. It serves as a platform where companies can raise capital by selling shares to the public, and investors can buy and sell these ownership stakes.</p>
                <p>Stock markets operate through exchanges, with major examples including the New York Stock Exchange (NYSE) and NASDAQ. These exchanges facilitate trading between buyers and sellers, establishing prices based on supply and demand.</p>
                <p>When you buy a stock, you become a shareholder - meaning you own a small piece of that company. Your goal as an investor is to buy stocks at a low price and sell them at a higher price, generating profits through capital appreciation.</p>`,
                keyPoints: [
                    { icon: "📈", text: "Stocks represent ownership in a company" },
                    { icon: "🏢", text: "Exchanges like NYSE facilitate trading" },
                    { icon: "💰", text: "Profits come from price appreciation" },
                    { icon: "📊", text: "Market prices determined by supply and demand" }
                ],
                questions: [
                    { q: "What is a stock?", opts: ["A loan to a company", "Ownership in a company", "A type of bond", "A government security"], correct: 1, reason: "Stocks represent partial ownership (equity) in a company." },
                    { q: "Where are stocks primarily traded?", opts: ["Banks", "Stock exchanges", "Insurance companies", "Real estate markets"], correct: 1, reason: "Stocks are traded on stock exchanges like NYSE and NASDAQ." },
                    { q: "What determines stock prices?", opts: ["Company CEO", "Government", "Supply and demand", "Fixed interest rate"], correct: 2, reason: "Stock prices are determined by market forces of supply and demand." },
                    { q: "What do you become when you buy a stock?", opts: ["Creditor", "Shareholder", "Employee", "Director"], correct: 1, reason: "Buying stock makes you a shareholder - an owner of the company." },
                    { q: "What is the main goal of stock investing?", opts: ["Guaranteed returns", "Tax avoidance", "Capital appreciation", "Loan forgiveness"], correct: 2, reason: "The primary goal is capital appreciation - buying low and selling high." }
                ]
            },
            {
                id: 2,
                title: "Understanding Stock Prices",
                description: "Learn what drives stock prices up and down",
                content: `<p>Stock prices fluctuate based on numerous factors, including company performance, economic conditions, market sentiment, and global events. Understanding these drivers is crucial for making informed investment decisions.</p>
                <p>Fundamental analysis examines a company's financials, management, and competitive position to determine its intrinsic value. Technical analysis, on the other hand, studies price patterns and trading volumes to predict future movements.</p>
                <p>Market capitalization (market cap) is calculated by multiplying a company's stock price by its total shares outstanding. This metric helps categorize companies as small-cap, mid-cap, or large-cap.</p>`,
                keyPoints: [
                    { icon: "📊", text: "Prices driven by company performance" },
                    { icon: "🔍", text: "Fundamental analysis finds intrinsic value" },
                    { icon: "📐", text: "Market cap = Price × Shares Outstanding" },
                    { icon: "📉", text: "Multiple factors affect price movements" }
                ],
                questions: [
                    { q: "What is market capitalization?", opts: ["Annual revenue", "Total debt", "Stock price × shares outstanding", "Monthly profits"], correct: 2, reason: "Market cap is calculated by multiplying stock price by total shares." },
                    { q: "What is fundamental analysis?", opts: ["Chart patterns", "Company financial analysis", "Random guessing", "Weather forecasting"], correct: 1, reason: "Fundamental analysis evaluates a company's financials and value." },
                    { q: "Which is NOT a factor affecting stock prices?", opts: ["Earnings", "Economic conditions", "Company color scheme", "Market sentiment"], correct: 2, reason: "Company color scheme has no impact on stock prices." },
                    { q: "What do technical analysts study?", opts: ["CEO backgrounds", "Price patterns and volumes", "Office locations", "Employee count"], correct: 1, reason: "Technical analysis studies historical price patterns and trading volumes." },
                    { q: "Large-cap companies typically have market cap over:", opts: ["$1 million", "$10 billion", "$2 billion", "$500 million"], correct: 2, reason: "Large-cap typically refers to companies with $2 billion+ market cap." }
                ]
            },
            {
                id: 3,
                title: "Types of Stocks",
                description: "Growth, value, blue chip, and penny stocks explained",
                content: `<p>Stocks are categorized in various ways based on characteristics like size, performance, and sector. Understanding these categories helps investors build diversified portfolios aligned with their goals.</p>
                <p>Growth stocks are companies expected to grow faster than the market average, often reinvesting profits rather than paying dividends. Value stocks trade below their intrinsic value, considered undervalued by investors.</p>
                <p>Blue chip stocks belong to large, established, financially sound companies with a history of stable performance. Penny stocks are low-priced stocks of small companies, offering high risk and potential reward.</p>`,
                keyPoints: [
                    { icon: "🚀", text: "Growth stocks focus on expansion" },
                    { icon: "💎", text: "Blue chips are stable, established companies" },
                    { icon: "💰", text: "Value stocks may be undervalued" },
                    { icon: "🎰", text: "Penny stocks are high-risk speculations" }
                ],
                questions: [
                    { q: "What are blue chip stocks?", opts: ["Cheap stocks", "Stable large companies", "New startups", "Government bonds"], correct: 1, reason: "Blue chips are large, established companies with stable performance." },
                    { q: "Growth stocks typically:", opts: ["Pay high dividends", "Reinvest profits", "Have no growth", "Are government-owned"], correct: 1, reason: "Growth companies reinvest earnings for expansion rather than paying dividends." },
                    { q: "Penny stocks are known for:", opts: ["Low risk", "High risk/reward", "Guaranteed returns", "Stable prices"], correct: 1, reason: "Penny stocks are volatile with high risk and potential reward." },
                    { q: "Value stocks are considered:", opts: ["Overpriced", "Undervalued", "Illegal", "Untradeable"], correct: 1, reason: "Value stocks trade below their intrinsic or book value." },
                    { q: "Which stock type pays regular dividends?", opts: ["Growth stocks", "Penny stocks", "Blue chips often do", "All stocks"], correct: 2, reason: "Blue chip companies often pay consistent dividends to shareholders." }
                ]
            },
            {
                id: 4,
                title: "How to Buy Stocks",
                description: "Step-by-step guide to purchasing your first stock",
                content: `<p>Buying stocks has become more accessible than ever with online brokerage platforms. Before investing, you need to complete account setup, fund your account, and research potential investments.</p>
                <p>To begin, open a brokerage account with a reputable firm. Many offer zero-commission trading. After funding your account through bank transfer, you can place buy orders for stocks.</p>
                <p>Order types matter: market orders execute immediately at current price, while limit orders only execute at your specified price or better. Understanding order types helps manage execution quality.</p>`,
                keyPoints: [
                    { icon: "🏦", text: "Open a brokerage account first" },
                    { icon: "💳", text: "Fund account via bank transfer" },
                    { icon: "📝", text: "Place buy orders through platform" },
                    { icon: "⚙️", text: "Understand market vs limit orders" }
                ],
                questions: [
                    { q: "What is a market order?", opts: ["Buy at your set price", "Buy at current market price", "Sell only", "Cancel order"], correct: 1, reason: "Market orders execute immediately at the current market price." },
                    { q: "What does a limit order do?", opts: ["Executes immediately", "Sets maximum buy price", "Guarantees execution", "Requires physical certificate"], correct: 1, reason: "Limit orders only execute at your specified price or better." },
                    { q: "To buy stocks you need:", opts: ["Physical certificate", "Brokerage account", "Stock exchange membership", "Government license"], correct: 1, reason: "You need a brokerage account to buy and sell stocks." },
                    { q: "How do you fund a brokerage account?", opts: ["Cash only", "Credit card only", "Bank transfer", "Cryptocurrency only"], correct: 2, reason: "Bank transfers are the standard method to fund brokerage accounts." },
                    { q: "Zero-commission trading means:", opts: ["All trades free", "Hidden fees exist", "Only for stocks", "Only for options"], correct: 0, reason: "Zero-commission means no trading fees for stock trades." }
                ]
            },
            {
                id: 5,
                title: "Portfolio Diversification",
                description: "Why putting all eggs in one basket is risky",
                content: `<p>Diversification is a risk management strategy that involves spreading investments across various assets, sectors, and geographies. The goal is to minimize the impact of poor performance from any single investment.</p>
                <p>Modern Portfolio Theory suggests that an optimally diversified portfolio can maximize returns for a given level of risk. This is achieved through assets that don't move together perfectly.</p>
                <p>Correlation measures how two assets move relative to each other. Assets with low or negative correlation provide better diversification benefits than those moving together.</p>`,
                keyPoints: [
                    { icon: "🧩", text: "Spread investments across assets" },
                    { icon: "📉", text: "Reduces impact of single losses" },
                    { icon: "🔗", text: "Low correlation = better diversification" },
                    { icon: "⚖️", text: "Balance risk and return" }
                ],
                questions: [
                    { q: "What is portfolio diversification?", opts: ["Buying one stock", "Spreading investments", "Only investing in bonds", "Keeping all cash"], correct: 1, reason: "Diversification spreads investments across various assets to reduce risk." },
                    { q: "What is correlation in investments?", opts: ["Stock price", "How assets move together", "Annual return", "Trading volume"], correct: 1, reason: "Correlation measures the relationship between asset price movements." },
                    { q: "What is the benefit of diversification?", opts: ["Higher guaranteed returns", "Lower risk", "Tax benefits", "No benefits"], correct: 1, reason: "Diversification reduces portfolio risk through spreading." },
                    { q: "Modern Portfolio Theory aims to:", opts: ["Maximize risk", "Maximize returns for given risk", "Minimize returns", "Eliminate all risk"], correct: 1, reason: "MPT optimizes risk-adjusted returns through asset allocation." },
                    { q: "Assets with negative correlation:", opts: ["Move together", "Move opposite directions", "Have no relationship", "Are the same asset"], correct: 1, reason: "Negatively correlated assets move in opposite directions." }
                ]
            },
            {
                id: 6,
                title: "Risk and Return",
                description: "Understanding the risk-return tradeoff",
                content: `<p>Risk and return are fundamentally linked in investing. Higher potential returns typically come with higher risk, and understanding this relationship is essential for building a suitable portfolio.</p>
                <p>Risk can be measured in various ways: standard deviation measures volatility, beta measures systematic risk relative to the market, and drawdown measures peak-to-trough decline.</p>
                <p>Risk tolerance depends on your financial goals, time horizon, and personal comfort with loss. Younger investors typically have higher risk tolerance due to longer time to recover losses.</p>`,
                keyPoints: [
                    { icon: "⚖️", text: "Higher returns require higher risk" },
                    { icon: "📊", text: "Standard deviation measures volatility" },
                    { icon: "⏰", text: "Time horizon affects risk tolerance" },
                    { icon: "🎯", text: "Match risk to your profile" }
                ],
                questions: [
                    { q: "What is the risk-return tradeoff?", opts: ["No relationship", "Higher risk = higher potential return", "Lower risk = higher return", "Risk eliminates returns"], correct: 1, reason: "Higher potential returns typically require accepting more risk." },
                    { q: "Standard deviation measures:", opts: ["Average return", "Price volatility", "Company size", "Dividend yield"], correct: 1, reason: "Standard deviation quantifies the dispersion of returns - volatility." },
                    { q: "Beta measures:", opts: ["Total risk", "Systematic market risk", "Company debt", "Dividend payments"], correct: 1, reason: "Beta measures a stock's sensitivity to market movements." },
                    { q: "Younger investors typically have:", opts: ["Lower risk tolerance", "Higher risk tolerance", "No risk tolerance", "Fixed risk tolerance"], correct: 1, reason: "Longer time horizons allow younger investors to take more risk." },
                    { q: "Risk tolerance depends on:", opts: ["Only age", "Goals, time horizon, personal comfort", "Only wealth", "Only education"], correct: 1, reason: "Risk tolerance is personal and depends on multiple factors." }
                ]
            },
            {
                id: 7,
                title: "Stock Analysis Methods",
                description: "Fundamental vs technical analysis explained",
                content: `<p>Investors use various methods to analyze stocks and make investment decisions. The two primary approaches are fundamental analysis and technical analysis, each with distinct methodologies and timeframes.</p>
                <p>Fundamental analysis examines financial statements, competitive positioning, management quality, and industry conditions to determine a stock's intrinsic value. Investors look for undervalued stocks.</p>
                <p>Technical analysis focuses on price patterns, trading volumes, and statistical indicators to predict future price movements. It's based on the idea that market prices reflect all relevant information.</p>`,
                keyPoints: [
                    { icon: "🔬", text: "Fundamental: analyze company value" },
                    { icon: "📈", text: "Technical: analyze price patterns" },
                    { icon: "📋", text: "Review financial statements" },
                    { icon: "📊", text: "Study chart indicators" }
                ],
                questions: [
                    { q: "Fundamental analysis studies:", opts: ["Chart patterns", "Company financials", "Trading volume only", "Random numbers"], correct: 1, reason: "Fundamental analysis examines financial health and business value." },
                    { q: "Technical analysis is based on:", opts: ["Company news", "Historical price patterns", "CEO interviews", "Product reviews"], correct: 1, reason: "Technical analysis uses historical price and volume data." },

        function startQuiz() {
            document.getElementById('contentSection').style.display = 'none';
            document.getElementById('quizSection').classList.add('active');
            currentQuestion = 0;
            answers = [];
            score = 0;
            loadQuestion();
        }

        // Load question
        function loadQuestion() {
            const q = module.questions[currentQuestion];
            
            // Progress dots
            const progressHTML = module.questions.map((_, i) => {
                let className = 'quiz-dot';
                if (i < currentQuestion) {
                    className += answers[i] === module.questions[i].correct ? ' correct' : ' wrong';
                } else if (i === currentQuestion) {
                    className += ' current';
                }
                return `<div class="${className}"></div>`;
            }).join('');
            document.getElementById('quizProgress').innerHTML = progressHTML;

            // Question
            const optionsHTML = q.opts.map((opt, i) => {
                let className = 'option';
                if (answers[currentQuestion] !== undefined) {
                    className += ' disabled';
                    if (i === q.correct) className += ' correct';
                    else if (i === answers[currentQuestion]) className += ' wrong';
                }
                return `
                    <div class="${className}" onclick="selectOption(${i})">
                        <span class="option-letter">${String.fromCharCode(65 + i)}</span>
                        <span>${opt}</span>
                    </div>
                `;
            }).join('');

            document.getElementById('questionCard').innerHTML = `
                <p class="question-text">${currentQuestion + 1}. ${q.q}</p>
                <div class="options">${optionsHTML}</div>
            `;

            // Explanation
            const explanationEl = document.getElementById('explanation');
            if (answers[currentQuestion] !== undefined) {
                const isCorrect = answers[currentQuestion] === q.correct;
                explanationEl.className = `explanation show ${isCorrect ? 'correct' : 'wrong'}`;
                explanationEl.innerHTML = `
                    <p class="explanation-title">${isCorrect ? '✓ Correct!' : '✗ Incorrect'}</p>
                    <p>${q.reason}</p>
                `;
            } else {
                explanationEl.className = 'explanation';
            }

            // Buttons
            document.getElementById('prevBtn').disabled = currentQuestion === 0;
            
            const nextBtn = document.getElementById('nextBtn');
            if (currentQuestion === module.questions.length - 1) {
                nextBtn.textContent = 'See Results';
                nextBtn.disabled = answers[currentQuestion] === undefined;
            } else {
                nextBtn.textContent = 'Next →';
                nextBtn.disabled = answers[currentQuestion] === undefined;
            }
        }

        // Select option
        function selectOption(optionIndex) {
            if (answers[currentQuestion] !== undefined) return;
            
            answers[currentQuestion] = optionIndex;
            if (optionIndex === module.questions[currentQuestion].correct) {
                score++;
            }
            
            loadQuestion();
        }

        // Previous question
        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                loadQuestion();
            }
        }

        // Next question
        function nextQuestion() {
            if (currentQuestion < module.questions.length - 1) {
                currentQuestion++;
                loadQuestion();
            } else {
                showResults();
            }
        }

        // Show results
        function showResults() {
            document.getElementById('quizSection').classList.remove('active');
            document.getElementById('resultsSection').classList.add('active');

            const percentage = (score / module.questions.length) * 100;
            document.getElementById('resultsScore').textContent = `${score}/${module.questions.length}`;
            
            if (percentage === 100) {
                document.getElementById('resultsIcon').textContent = '🏆';
                document.getElementById('resultsTitle').textContent = 'Perfect Score!';
                document.getElementById('resultsMessage').textContent = "Excellent! You've mastered this module!";
            } else if (percentage >= 80) {
                document.getElementById('resultsIcon').textContent = '🎉';
                document.getElementById('resultsTitle').textContent = 'Great Job!';
                document.getElementById('resultsMessage').textContent = 'You have a solid understanding of this topic.';
            } else if (percentage >= 60) {
                document.getElementById('resultsIcon').textContent = '👍';
                document.getElementById('resultsTitle').textContent = 'Good Effort!';
                document.getElementById('resultsMessage').textContent = 'Consider reviewing the material and trying again.';
            } else {
                document.getElementById('resultsIcon').textContent = '📚';
                document.getElementById('resultsTitle').textContent = 'Keep Learning!';
                document.getElementById('resultsMessage').textContent = 'Review the study material and try again.';
            }

            // Save progress
            saveProgress();
        }

        // Retry quiz
        function retryQuiz() {
            document.getElementById('resultsSection').classList.remove('active');
            document.getElementById('contentSection').style.display = 'block';
            loadModule();
        }

        // Initialize
        loadModule();
    </script>
</body>
</html>
